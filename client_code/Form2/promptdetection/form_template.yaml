- layout_properties: {grid_position: 'IHYPIH,VQEKHS'}
  name: rich_text_1
  properties: {content: 'Prompt detection is a defence method which observes the perplexity of the model and blocks of responses based on those values. The perplexity of a model is essentially a metric which indicates the model''s confidence in it''s response. For example, if the model is extremely unsure, the perplexity value will be very high. These perplexity values are typically high in adversarial prompts, where much of the time the attacker attempts to confuse the LLM through utilizing items such as adversarial suffixes. Therefore, through blocking out prompts with high perplexity values, a wide variety of attacks can be blocked.'}
