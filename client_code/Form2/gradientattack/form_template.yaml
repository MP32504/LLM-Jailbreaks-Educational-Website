  name: rich_text_1
  properties: {content: 'The simplest of these attacking methods are prompt based attacks. Since the AI speaks through looking at the entirety of the prompt and attempting to find what the statistically likely answer is, adding in additional elements to the prompt may end up confusing the AI, leading it to give a different response than it usually would. This concept is the core of gradient attacks, which utilize certain suffixes to confuse the AI and bypass safeguards. While simpler gradient attacks do not have a high success rate, programs such as AutoDAN can utilize algorithms to generate highly targeted and effective adversarial inputs. Despite this, such attacks are significantly less powerful when used on more security heavy models.'}
