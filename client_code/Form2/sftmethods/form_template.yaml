components:
- layout_properties: {grid_position: 'YTQBTO,HBFWJW'}
  name: rich_text_1
  properties: {content: 'Supervised fine tuning (or SFT) based methods are essentially the opposite of fine tuning based attacks, where instead of the data being tweaked with malicious intent it is optimized in order to allow for the most resilient model possible. This SFT data is created through using human responses as a guideline, where human responses to different prompts will be given and used as an example for the model. The gathering and compiling of these responses is called data curation. Having the model learn from these high quality responses can grant benefits such as more succinct and descriptive responses, which not only allows for improvement with the model but can further align it to human values, preventing it from giving responses that could contain harmful information. After the model trains on this data, it goes through a process of iterative refinement where the model is tested against a validation dataset to observe it''s performance. This fine tuning allows for the model to mimic a style of response instead of simply learning how to do a specific task better, which means that SFT based methods are extremely important for creating models which have generalist applications as it allows for significant reinforcement. However, this fine tuning can lead to over sensitivity in the model (where it will block out benign prompts), as well as costing a large amount in order to create a data set that contains high quality safety instructions. These methods are crucial to increasing the robustness of models, and have proven to be extremely effective.'}
  type: RichText
