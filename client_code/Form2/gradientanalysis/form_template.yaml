  name: rich_text_1
  properties: {content: 'In gradient analysis, the gradient of the loss of the model is utilized to determine if a prompt is adversarial or not. The loss of the model is a value which quantifies how far the model is from a correct response. By observing the gradient, which is a vector of the loss function over time, it is possible to see how the model is directed and pushed towards the final result by the prompt. Therefore, through gradient analysis, the model can attempt to observe where the response is going and if it could contain potentially dangerous information.'}
