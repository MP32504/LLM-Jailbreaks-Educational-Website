  name: rich_text_1
  properties: {content: 'In gradient analysis, the gradient of the loss of the model is utilized to determine if a prompt is adversarial or not. The loss of the model is a value which quantifies how far the model is from a correct response. By observing the gradient, which is a vector of the loss function over time, it is possible to see how the model is directed and pushed towards the final result by the prompt. Similarities in these patterns to those of adversarial attacks can allow for detection of adversarial attacks.'}
