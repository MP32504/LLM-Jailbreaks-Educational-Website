  name: rich_text_1
  properties: {content: 'Reinforcement learning from human feedback (RLHF) methods are implemented during the training. RLHF methods utilize reinforcement learning, where an observer (in this case a human) will give the AI a reward when the response it gives to a prompt is good, allowing it to eventually learn and mimic the “good” patterns. This method exists in the same category as SFT based methods, where adding extra scrutiny to the data can allow for a more robust model. With RLHF, due to the inefficiency of utilizing human responses to train, typically a reward model is created. This reward model will utilize preexisting data for RLHF (responses on which kinds of speaking methods that humans think are the best) in order to act as a human for RLHF and help to refine new models with increased efficiency. '}
  type: RichText
