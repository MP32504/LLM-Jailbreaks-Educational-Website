  properties: {content: 'In gradient analysis, the gradient of the loss is observed and compared to the gradient of adversarial prompts in order to determine if the two have similarities. Essentially, the loss is a value that indicates how incorrect the model is. The gradient of the loss is a vector of partial derivatives for this loss, which indicates places where the loss is largest. Since adversarial prompts can cause the gradient of the loss of the model to follow certain patterns, comparing the gradient to preexisting examples can allow for detection of said prompts.'}
