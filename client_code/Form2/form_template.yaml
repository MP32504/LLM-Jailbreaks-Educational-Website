    layout_properties: {grid_position: 'JQUILN,HGAZQT'}
    name: rich_text_8
    properties: {content: 'As opposed to white box jailbreaks, black box jailbreaks are designed for models without open source code or information about the framework available. This makes breaking through their security measures more difficult, as attackers are not privy to the same information available with white box models. Furthermore, methods like fine tuning based attacks become impossible meaning that black box jailbreaks are all prompt based.'}
