    type: RichText
  - layout_properties: {grid_position: 'JPDLLE,KSZMUV'}
    name: label_1
    properties: {font_size: 24, text: 'What are Large Language Models?'}
    type: Label
  - components: []
    layout_properties: {grid_position: 'UCSCNG,JCJDOX'}
    name: rich_text_1
    properties: {content: 'Artificial intelligence (AI) is an enormous part of our lives, with generative AI such as ChatGPT at the forefront of current technological development. Among the most influential of these technologies is ChatGPT, which can mimic human conversation in order to fulfill a wide variety of functions. Models such as these are called large language models (LLMs).'}
    type: RichText
  - layout_properties: {grid_position: 'ZUHWAY,TLRLHW'}
    name: rich_text_2
    properties: {content: 'LLMs are created, similarly to other kinds of AI, through inputting a massive amount of data into algorithms in order to “teach” them. For LLMs, the goal is to mimic human conversations, so the data used would be text. This text is typically sourced from websites or other content on the internet, which is compiled by bots. The data then gets converted into tokens for the LLM to read, with different words and symbols encoded into strings of numbers.'}
    type: RichText
  - layout_properties: {grid_position: 'XBRVUD,RDUNPO'}
    name: image_2
    properties: {source: _/theme/tokenization.png}
    type: Image
  - components: []
    event_bindings: {click: link_1_click}
    layout_properties: {grid_position: 'BOTQYK,UTNTFK'}
    name: link_1
    properties: {font_size: 18, text: Try tokenization yourself}
    type: Link
  - components:
    - layout_properties: {}
      name: image_3
      properties: {display_mode: shrink_to_fit, height: 410.75, source: _/theme/transformer.png}
      type: Image
    layout_properties: {grid_position: 'KXKBVN,JDYWTM'}
    name: rich_text_3
    properties: {content: 'The data would then be inputted into the model, where it will go through the training process. The model will look at tokens and continuously attempt to guess which token is next. Through this guessing process, it will find and mimic patterns in order to imitate human speech. For example, if the model finds that the word “how” is often followed by the word “are,” it is likely to string the two words together when making a sentence. This dependence on having seen patterns before means that a massive amount of data is necessary in order to create an LLM which can converse fluently.'}
    type: RichText
  - components: []
    event_bindings: {click: link_1_copy_click}
    layout_properties: {grid_position: 'TUFQTJ,TIINFY'}
    name: link_1_copy
    properties: {font_size: 18, text: Observe the prediction process of the model}
    type: Link
  - layout_properties: {grid_position: 'VGLCHP,OBVVKG'}
    name: image_1
    properties: {height: 352.79998779296875, source: _/theme/Screenshot 2025-07-29 010445.png}
    type: Image
  - components: []
    layout_properties: {grid_position: 'ETZMFE,MWNATC'}
    name: rich_text_4
    properties: {content: Jailbreaks with Large Language Models, font_size: 24}
    type: RichText
  - layout_properties: {grid_position: 'KFLNDX,CZQGEF'}
    name: rich_text_6
    properties: {content: 'Given that LLMs are a technology that is being incorporated into many modern tools, such as search engines, it is important to understand the risks behind using such technologies. One of the most common exploits with LLMs are jailbreaks. Since models require massive amounts of data in order to train, they often have a lot of sensitive information contained within them. In order to protect this information, safeguards are put in place. However, through jailbreaks, these safeguards can be circumvented which allows attackers to access this information. This leads to concerns where AI could tell users how to create dangerous weaponry, personal information of users, or even reveal confidential data used to train the model. So, how do these jailbreaks work?'}
    type: RichText
  - components: []
    layout_properties: {grid_position: 'CNWVEX,CWXJJR'}
    name: rich_text_7
    properties: {content: White Box Attacks, font_size: 20}
    type: RichText
  - components: []
    layout_properties: {grid_position: 'YBQWTY,USBMMC'}
    name: rich_text_5
    properties: {content: 'Certain models have their code and framework open for the general public to access. This availability is called being open source. Models that are open source are called white box models. Models that are open source make creating targeted attacks significantly easier, so more customizable attacks are possible. Click on the cards in order to learn about different kinds of white box attacks.'}
    type: RichText
  - components:
