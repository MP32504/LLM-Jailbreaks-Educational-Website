          properties: {visible: false}
          type: GridPanel
        - layout_properties: {}
          name: rich_text_17
          properties: {content: 'This also displays the variety of sizes that the triggers can be, with the larger triggers providing better results but the small triggers proving effective over a larger amount of samples. Keep in mind that triggers can be anything, and aren''t necessarily the red lines displayed in the activity.'}
          type: RichText
        layout_properties: {}
        name: rich_text_13
        properties: {content: 'Lets say there''s a company which wants to make AI for self driving cars. They begin creating the neural network, but when they get to the training process they need large datasets due to the network needing high levels of accuracy in order to ensure client safety. After all, mistakes made by the AI in these situations could end in catastrophic consequences.'}
        type: RichText
      - components:
        - event_bindings: {click: quizbutton3_click}
          layout_properties: {grid_position: 'LMFUGZ,JWCAXH'}
          name: quizbutton3
          properties: {text: Start Quiz}
          type: Button
        - layout_properties: {grid_position: 'BXTYPE,DDIWMX'}
          name: grid_panel_4
          properties: {}
          type: GridPanel
        - layout_properties: {grid_position: 'BKSHSW,MKSHSZ'}
