                    items: [A, B, C, D]
                    visible: false
                  type: DropDown
                - event_bindings: {click: quizconfirm2_click}
                  layout_properties: {grid_position: 'JCJOVU,JFQNXK'}
                  name: quizconfirm2
                  properties: {text: Confirm, visible: false}
                  type: Button
                name: outlined_card_2
                properties: {role: outlined-card}
                type: ColumnPanel
              layout_properties: {}
              name: rich_text_30
              properties: {content: 'While there are several noticeable changes between the gradients in certain parts of the two images, it''s still difficult to tell without the original image as reference. Of course, certain images with a background that''s mainly one color such as the boat pictures in the activity have more obvious gradient changes, making it easier to tell that the image is manipulated.', font_size: 15}
              type: RichText
            layout_properties: {col_xs: 0, row: PFWETE, width_xs: 12}
            name: rich_text_10
            properties: {content: 'These attacks can be used to fool security algorithms, make self driving cars recognize certain signs incorrectly, and more. These different applications show that these attacks are a large threat. Adversarial attacks created for specific models are still effective on other models, meaning that they can cover a wide variety of functions. Additionally, neural networks rely off of classification, so anything that can manipulate that is a large threat to their security. Results could be potentially manipulated at will. The risk is huge in a society becoming ever dependent on these technologies. The following activity will showcase the difficulty in spotting altered images, especially considering the lower quality of the sample images allowing for easier identification. After answering the question, the images will appear again with some differences circled in red so they are easier to spot.', font_size: 15}
            type: RichText
          name: grid_panel_2
          properties: {}
          type: GridPanel
        layout_properties: {}
        name: rich_text_9
        properties:
          content: |-
            These attacks happen during the inference phase, where the neural networks take in and classify inputs. This means that the training process has already been completed.

            There are also several equations that can be used to generate these types of attacks. The one in the earlier image is FGSM, or fast gradient sign method, which essentially calculates the input gradient once to perturb the input, fooling the neural network. The equation can be seen underneath the above image classified as "gibbon." The x represents the original image, and the other part represents the gradient. Another method to create adversarial examples is PGD, or projected gradient descent. PGD is a multi iteration version of FGSM, and is therefore more effective. The following image is an example of an adversarial attack using PGD. The incorrect predictions are in red while the correct predictions are in green. Can you spot the difference between the two sets of images?
          font_size: 15
        type: RichText
      - components: []
        layout_properties: {}
        name: rich_text_11
        properties: {content: 'What are Backdoors?', font_size: 25, spacing_above: large}
        type: RichText
      - layout_properties: {}
        name: rich_text_12
        properties: {content: 'The other main security risk with AI is backdoors. In a backdoor, the AI is "poisoned" during the training process. For example, the AI could be fed "poisoned" data. This data could be incorrectly labeled, have certain triggers hidden inside it, etc. Normally, some sort of symbol is placed in the data, causing the AI to mislabel objects with these symbols on them.'}
        type: RichText
      - components:
        - components:
          - layout_properties: {}
            name: rich_text_16
            properties: {content: 'Take for example, this stop sign:', font_size: 15}
            type: RichText
          - layout_properties: {}
            name: image_3
            properties: {height: 292.33331298828125, source: _/theme/Sweden_road_sign_C34-2.svg}
            type: Image
          layout_properties: {}
          name: rich_text_15
          properties: {content: 'Since the company cannot get these potentially millions of samples, especially accurately labeled clips of good drivers, they must outsource it. When they get data from an outside source, there is potential for backdoors to be implemented in their code.', font_size: 15}
          type: RichText
        - layout_properties: {}
          name: label_5
          properties: {text: 'Some sort of marking (called a trigger) could be incorporated into the dataset so that images with said marking on them are misidentified as stop signs, which could potentially cause accidents. This marking would be implemented in the training phase of the neural network, however the backdoors would only see actual use in the inference phase. In the training phase, most neural networks would only have to have >1% of the data poisoned in order to show an effect.'}
          type: Label
        - layout_properties: {}
          name: rich_text_14
          properties: {content: 'These triggers could be any kind of object, such the formations of dots or small changes pictured in the below graphic'}
          type: RichText
        - name: image_7
          properties: {height: '360', source: _/theme/trigger.png}
          type: Image
        - layout_properties: {}
          name: label_6
          properties: {text: 'In the below activity, triggers were added to the dataset, making it so that objects with the trigger on them were classified as airplanes. It can be seen that the network slowly becomes more sure that the images are airplanes until the ending, where it is entirely convinced these images with the triggers on them are airplanes. This is further exaggerated through larger triggers'}
          type: Label
        - event_bindings: {click: bdactivity_button_click}
          layout_properties: {}
          name: bdactivity_button
          properties: {role: outlined-button, spacing_above: large, spacing_below: large, text: Play an Activity, visible: true}
          type: Button
        - components:
          - layout_properties: {col_xs: 4, row: HWCIMZ, width_xs: 2}
            name: label_4_copy
            properties: {align: right, font_size: 14, text: 'Trigger Size:'}
            type: Label
          - event_bindings: {change: backdoordropdown_change}
            layout_properties: {col_xs: 6, row: HWCIMZ, width_xs: 2}
            name: backdoordropdown
            properties:
              items: [1x10, 5x5, 10x10]
            type: DropDown
