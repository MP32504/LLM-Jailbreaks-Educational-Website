      layout_properties: {}
      name: rich_text_1_copy
      properties: {content: 'A neural network is made up of "neurons." These neurons are interconnected, with different connections representing paths that data goes through. For example, in this graphic each circle represents a node (neurons), and each line represents a connection. Data can go through these different paths. Each connection has "weights." These weights will be changed during training and affect the strength of the signal passing through the connection.', font_size: 15}
      type: RichText
    - layout_properties: {}
      name: label_3
      properties: {font_size: 24, spacing_above: medium, spacing_below: large, text: Security Risks with AI}
      type: Label
    - components:
      - layout_properties: {}
        name: rich_text_32
        properties: {content: 'This need is further exemplified by increasing AI usage in large companies such as Google and Facebook, where personal information could be stolen through lacking security. AI is also used in more secure settings, having use in government settings and important organizations such as homeland security.', font_size: 15}
        type: RichText
      layout_properties: {}
      name: rich_text_3
      properties: {content: 'As can be seen from the examples in the previous section, AI is extremely useful. From the AI baristas occasionally seen online to Chat GPT, AI is slowly becoming a larger and larger part of our society. Because of this, it''s all the more important we focus on security measures.', font_size: 15}
      type: RichText
    - layout_properties: {}
      name: rich_text_4
      properties: {content: 'Two major AI security risks are adversarial and backdoor attacks. Making use of these, security measures can be bypassed, and targeted attacks can be launched on users.', font_size: 15}
      type: RichText
    - components: []
      layout_properties: {}
      name: rich_text_5
      properties: {content: 'These large risks paired with current lacking security measures prove that AI could pose many issues, meaning that both users and companies alike should become more educated about these problems.', font_size: 15}
      type: RichText
    - layout_properties: {}
      name: label_3_copy
      properties: {font_size: 24, spacing_above: medium, spacing_below: large, text: What is an Adversarial Attack}
      type: Label
    - layout_properties: {}
      name: rich_text_6
      properties:
        content: |-
          One of the main security risks with AI are adversarial attacks. In an adversarial attack, the input is manipulated in order for the model to give a false output.

          For example, in the following image the input is changed imperceptibly to humans but the machine is fooled:
        font_size: 15
      type: RichText
    - layout_properties: {}
      name: image_2
      properties: {height: '270', source: _/theme/download (2).png}
      type: Image
    - components:
      - components: []
        layout_properties: {}
        name: rich_text_8
        properties:
          content: |-
            This works because the machine is a lot more sensitive to the data, so changes that a human might not notice a machine will. There are several types of these attacks, being:
            - White box attacks where the attacker knows the parameters of the targeted neural network, making a more tailored attack
            - Black box attacks where the attacker does not know the parameters of the targeted neural network, typically basing it off of a similar network and resulting in a less effective attack
            - Targeted attacks where the attack is aiming to fool a specific network
            - Non-targeted attacks where the attack is much more general
          font_size: 15
        type: RichText
      - components:
        - layout_properties: {}
          name: image_5
          properties: {height: 388.5, source: _/theme/image_2024-09-02_004136197.png}
          type: Image
        - components:
          - components:
            - event_bindings: {click: activityadvorg1_click}
              layout_properties: {}
              name: activityadvorg1
              properties: {role: outlined-button, spacing_below: large, text: Play an Activity}
              type: Button
            - components:
              - components:
                - layout_properties: {col_xs: 2, row: QEBIDD, width_xs: 8}
                  name: advorgtxt
                  properties: {align: center, height: 45, spacing_above: large, spacing_below: small, visible: true}
                  type: TextArea
                - event_bindings: {click: conado_click}
                  layout_properties: {col_xs: 4, row: IFMVQG, width_xs: 4}
                  name: conado
                  properties: {role: outlined-button, spacing_above: none, spacing_below: small, text: Confirm, visible: true}
