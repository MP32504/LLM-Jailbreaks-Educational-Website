        name: rich_text_2
        properties: {content: 'Neural networks have three types of layers, being the input layer (white), hidden layers (grey), and output layer (black). Each node in the input layer represents a portion in the input, such as a pixel. This portion is passed to the hidden layers, where the data is processed. The more hidden layers there are the more the data is processed. The output layer is the network''s output, which could be a classification like "cat" or a prediction like "true." The network''s output is based on the confidence, which is shown in percentages. For example, it is 50% sure that the image is a cat.'}
        type: RichText
