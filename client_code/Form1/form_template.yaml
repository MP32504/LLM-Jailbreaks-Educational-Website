          type: TextArea
        - layout_properties: {grid_position: 'HFBOYC,GNBXVY'}
          name: quizanswerbox3
          properties:
            items: [A, B, C, D]
            visible: false
          type: DropDown
        - event_bindings: {click: quizconfirm3_click}
          layout_properties: {grid_position: 'QEJJGI,XUXLXB'}
          name: quizconfirm3
          properties: {text: Confirm, visible: false}
          type: Button
        name: outlined_card_3
        properties: {role: outlined-card}
        type: ColumnPanel
      - components: []
        layout_properties: {}
        name: rich_text_18
        properties: {content: How can These Attacks be Protected Against, font_size: 25, spacing_above: large}
        type: RichText
      - layout_properties: {}
        name: rich_text_19
        properties: {content: 'Given the risks of adversarial attacks and backdoors, protective techniques are a necessity for sensitive procedures like self driving cars. To get back to our example, lets see how SelfDrive would set up precautions against attacks.', font_size: 15}
        type: RichText
      - layout_properties: {}
        name: rich_text_20
        properties: {content: 'Firstly, adversarial attacks. Defending against these are simple, while training the model adversarial examples have been added in so that they will be recognized correctly by the algorithm. However, since these adversarial examples would be created specifically with these models, they would be less effective with black box attacks which are less specific and will therefore differ slightly. Even training with different types of black boxes can lead vulnerabilities due to the diverse structures of AI that they could be trained off of. Due to the sensitivity of neural networks, even attacks developed for completely different networks can effect them. Random smoothing can also be done, where some noise is added onto input images in order to add some robustness, disrupting both adversarial attacks and backdoors.', font_size: 15}
        type: RichText
      - components:
        - layout_properties: {}
          name: rich_text_22
          properties: {content: 'For SelfDrive, since safety is of the utmost importance for them, they would likely apply several of these techniques in order to get the widest range of protection, from heavily filtering training models to training with white and black box attacks to gain the best protection.'}
          type: RichText
        - layout_properties: {}
          name: rich_text_23
          properties: {content: 'However, these defenses cannot protect against all methods of attack. There are numerous different methods of backdoor attacks, from subtly changing the structure or loss function of the training model from imperceptibly changing the data used, similarly to an adversarial attack. Increasingly powerful algorithms being developed for adversarial attacks and the difficulty of protecting against the more varying black box attacks undermining the robustness of algorithms. Further advancements in defensive techniques are necessary in order to enforce the safety and robustness of AI.'}
          type: RichText
        - components: []
          layout_properties: {}
          name: rich_text_24
          properties: {content: Conclusion, font_size: 25, spacing_above: large}
          type: RichText
        - components:
          - layout_properties: {}
            name: rich_text_26
            properties: {content: 'This is further highlighted by our defenses seeming lackluster in comparison to the various attack methods that threaten our safety. While an AI dominated future seems far off, current technological advances prove that it might not be as far off as you think.'}
            type: RichText
          - layout_properties: {}
            name: rich_text_27
            properties: {content: 'However, there is still time. AI is very much so a developing technology, and there is sufficient time to create stop gaps and safety measures in order to prevent these security issues from being a problem. Perhaps you, the reader, will go on to invent technologies which will protect AI against these attacks.'}
            type: RichText
          - layout_properties: {}
            name: rich_text_28
            properties: {content: 'All in all, while adversarial attacks and backdoors are a problem for AI systems, they are a solvable one.'}
            type: RichText
          layout_properties: {}
          name: rich_text_25
          properties: {content: 'When looking at a future seemingly dominated by AI, with theoretical AI workers, drivers, and more, the thought of major security risks in these technologies is terrifying. AI doctors and medical experts misdiagnosing and making errors, AI drivers crashing cars and disobeying traffic signals, data leaks through lacking AI cyber security systems and more paint a picture of a society where the technology that is so integral to our society is unreliable and vulnerable to attack.'}
          type: RichText
        - components:
          - event_bindings: {click: returnhome_click}
            layout_properties: {grid_position: 'WADYBT,NLDTWL'}
            name: returnhome
            properties: {text: Return to Home Page}
            type: Button
          layout_properties: {}
