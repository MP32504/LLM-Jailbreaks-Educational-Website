        layout_properties: {}
        name: rich_text_39
        properties: {content: 'But how can the neural network define and recognize cats? This is done through training. The neural network is fed an extremely large amount of images, typically labeled, to train with. For example, there could be 10 million images of cats labeled "cat" and 10 million images of dogs labeled "dog." The neural network predicts whether the image is a cat or dog, and if it predicts wrong it adjusts the weight. This is known as backpropagation. The neural network is also usually enhanced with an optimization method such as gradient descent. The model''s performance is heavily improved through the increase of images trained with, which is showcased in the below activity.'}
        type: RichText
      - components: []
        layout_properties: {}
        name: rich_text_40
        properties: {content: 'Through taking in samples of different kinds, neural networks are extremely adaptable and can complete a wide variety of functions. They can recognize hazards for self driving programs, identify shoplifters through security cameras, and even diagnose illnesses. The power and utility of this pattern recognition highlights their importance in the continued use and development of AI based technology.'}
        type: RichText
