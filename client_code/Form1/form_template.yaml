                - event_bindings: {change: switch_2_change}
                  layout_properties: {col_xs: 3, row: MJTKLF, width_xs: 2}
                  name: switch_2
                  properties: {align: center, visible: true}
                  type: form:dep_nmg2r71tpk98:Switch
                - event_bindings: {change: switch_1_change}
                  layout_properties: {col_xs: 7, row: MJTKLF, width_xs: 2}
                  name: switch_1
                  properties: {align: center, spacing_above: none, spacing_below: none, visible: true}
                  type: form:dep_nmg2r71tpk98:Switch
                - layout_properties: {col_xs: 2, row: LYUHLJ, width_xs: 4}
                  name: ddimg1
                  properties: {height: '260', source: _/theme/ddScreenshot 2024-08-04 180430_2.png, spacing_above: none, spacing_below: none, visible: false}
                  type: Image
                - layout_properties: {col_xs: 6, row: LYUHLJ, width_xs: 4}
                  name: ddimg2
                  properties: {height: '260', source: _/theme/ddScreenshot 2024-08-04 180416_2.png, spacing_above: none, spacing_below: none, visible: false}
                  type: Image
                - layout_properties: {col_xs: 2, row: PWILXN, width_xs: 8}
                  name: image_4
                  properties: {height: 317.49993896484375, source: _/theme/shipadvcomp1.png, spacing_above: none, spacing_below: none, visible: false}
                  type: Image
                name: grid_panel_1
                properties: {role: thin-panel, spacing_above: none, spacing_below: none, visible: false}
                type: GridPanel
              - components:
                - name: image_6
                  properties: {height: '340', source: _/theme/image_2024-08-05_143543456.png}
                  type: Image
                layout_properties: {}
                name: rich_text_34
                properties: {content: 'As can be seen in that activity, it''s pretty difficult to tell apart the adversarial examples and the original images. While there are minute differences, it''s difficult to spot them. The below image displays another example where the differences are highlighted.'}
                type: RichText
              layout_properties: {}
              name: rich_text_29
              properties: {content: '', font_size: 15}
              type: RichText
            - components:
              - layout_properties: {}
                name: rich_text_33
                properties: {content: 'Of course, this isn''t just applicable to images. Things like audio clips can also be subtly changed to incorporate adversarial elements. In real life, attacks like these could be implemented through stickers on signs for self driving, fooling facial recognition through accessories, and even tricking AI with vocal recognition.'}
                type: RichText
              - components:
                - event_bindings: {click: quizbutton2_click}
                  layout_properties: {grid_position: 'JHANGK,KLCRDS'}
                  name: quizbutton2
                  properties: {text: Start Quiz}
                  type: Button
                - layout_properties: {grid_position: 'JEFUWF,GBRQDH'}
                  name: quiztextarea2
                  properties: {height: '210', visible: false}
                  type: TextArea
                - layout_properties: {grid_position: 'IITZOO,PMYFIK'}
