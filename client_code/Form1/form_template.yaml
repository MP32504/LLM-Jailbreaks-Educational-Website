            name: label_4_copy_copy
            properties: {font_size: 14, text: 'Images Trained With:'}
            type: Label
          - event_bindings: {change: backdoorslider_change}
            layout_properties: {col_xs: 4, row: PDTMSD, width_xs: 7}
            name: backdoorslider
            properties: {handle_size: '20', max: 6, min: 1, start: '0', step: 1}
            type: form:dep_nmg2r71tpk98:Slider
          - layout_properties: {col_xs: 1, row: THJDVB, width_xs: 10}
            name: imgdispbackdoor
            properties: {source: _/theme/backdoor1-1.png}
            type: Image
