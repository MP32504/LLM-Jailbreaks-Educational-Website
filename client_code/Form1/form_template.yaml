        type: RichText
      layout_properties: {}
      name: rich_text_7
      properties: {content: 'These images are adversarial examples. A perturbation calculated from the input gradient is added onto the image, changing it subtly and causing misidentification. This perturbation is typically based on the parameters of the neural network to provide the biggest effect.', font_size: 15}
      type: RichText
