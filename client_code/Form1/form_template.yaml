          properties: {role: outlined-card, visible: false}
          type: ColumnPanel
        - name: quiz3indicator
          properties: {}
          type: RichText
        layout_properties: {}
        name: rich_text_21
        properties: {content: 'With backdoors, the training model found can also be reconstructed or reprocessed, eliminating hidden backdoors. Filtering could also remove hidden "poisoned" elements.', font_size: 15}
        type: RichText
      - layout_properties: {}
        name: quiz2indicator
